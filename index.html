<style>
  :root{
    --night:#0A2620; --night2:#0E3128; --gold:#C9A24A; --goldlt:#E9D292;
    --cream:#F3EAD6; --creamdim:rgba(243,234,214,.62); --creamfaint:rgba(243,234,214,.36);
    --hair:rgba(201,162,74,.26); --hairs:rgba(201,162,74,.5); --glass:rgba(255,255,255,.05);
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    font-family:'Noto Sans Thai',-apple-system,BlinkMacSystemFont,sans-serif;
    color:var(--cream);
    background:
      radial-gradient(120% 60% at 80% -8%,rgba(201,162,74,.2),transparent 52%),
      radial-gradient(120% 50% at 10% 105%,rgba(46,116,100,.28),transparent 55%),
      linear-gradient(168deg,#0E3128,#0A2620 52%,#072019);
    background-attachment:fixed;
    min-height:100vh;
    -webkit-font-smoothing:antialiased;
  }
  .app{display:flex;justify-content:center;min-height:100vh;position:relative}
  .noise{position:fixed;inset:0;pointer-events:none;opacity:.05;z-index:0;
    background-image:radial-gradient(rgba(255,255,255,.85) .5px,transparent .8px);background-size:3px 3px;}
  .frame{width:100%;max-width:520px;min-height:100vh;display:flex;flex-direction:column;position:relative;overflow:hidden;z-index:1}

  /* ---- gold shimmer text ---- */
  .gold-text{
    background:linear-gradient(92deg,#A9842F,#E9D292 28%,#C9A24A 52%,#F2DEA0 74%,#B58B33);
    background-size:220% 100%;-webkit-background-clip:text;background-clip:text;color:transparent;
    animation:kklShimmer 6s linear infinite;
  }
  @keyframes kklShimmer{to{background-position:220% 0}}
  @keyframes kklRise{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
  @keyframes kklSweep{0%{transform:translateX(-130%)}60%,100%{transform:translateX(380%)}}
  @keyframes kklPop{0%{transform:scale(.4);opacity:0}60%{transform:scale(1.15)}100%{transform:scale(1);opacity:1}}
  .rise{animation:kklRise .45s cubic-bezier(.22,1,.36,1)}
  @media (prefers-reduced-motion:reduce){*{animation:none!important}}

  /* ---- header ---- */
  header{position:relative;padding:30px 26px 14px;z-index:1}
  .langtoggle{position:absolute;top:24px;right:24px;display:flex;border:1px solid var(--hairs);
    border-radius:99px;overflow:hidden;background:var(--glass);backdrop-filter:blur(6px);z-index:5}
  .langbtn{border:none;font-family:inherit;font-weight:700;font-size:12px;padding:7px 13px;cursor:pointer;letter-spacing:.5px;background:transparent;color:var(--creamdim)}
  .langbtn.active{background:linear-gradient(100deg,#C9A24A,#E9D292);color:#0A2620}
  .deco{position:absolute;top:-6px;right:-46px;width:230px;opacity:.1;pointer-events:none}
  .brand-mono{width:54px;height:54px;border-radius:50%;display:grid;place-items:center;position:relative;margin-bottom:15px;
    background:radial-gradient(circle at 35% 30%,rgba(233,210,146,.25),rgba(201,162,74,.06));
    box-shadow:inset 0 0 0 1.5px var(--hairs),0 0 24px rgba(201,162,74,.18)}
  .brand-mono::after{content:"";position:absolute;inset:6px;border:1px solid rgba(201,162,74,.5);border-radius:50%}
  .brand-mono span{font-family:'Trirong',serif;font-weight:700;font-size:24px}
  .eyebrow{font-size:11px;letter-spacing:5px;text-transform:uppercase;color:var(--gold);font-weight:600}
  .brand-title{font-family:'Trirong',serif;font-weight:700;font-size:clamp(30px,8vw,42px);line-height:1.04;margin-top:8px}
  .brand-sub{font-family:'Trirong',serif;font-style:italic;font-size:14px;letter-spacing:4px;color:var(--creamdim);margin-top:9px}
  .divider{display:flex;align-items:center;gap:11px;margin-top:15px}
  .divider .ln{height:1px;flex:1}
  .tagline{font-size:12.5px;color:var(--creamdim);margin-top:13px;line-height:1.55}

  /* ---- tabs + cart chip ---- */
  .navrow{display:flex;gap:10px;align-items:center;margin-top:16px}
  .tabs{display:flex;flex:1;border:1px solid var(--hair);border-radius:99px;padding:4px;background:var(--glass);backdrop-filter:blur(6px)}
  .tab{flex:1;border:none;background:transparent;color:var(--creamdim);font-family:inherit;font-weight:600;font-size:13px;padding:9px 6px;border-radius:99px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;transition:color .2s}
  .tab.active{background:linear-gradient(100deg,rgba(201,162,74,.22),rgba(233,210,146,.12));color:var(--goldlt);box-shadow:inset 0 0 0 1px var(--hairs)}
  .tab svg{width:15px;height:15px}
  .chip{display:inline-flex;align-items:center;gap:8px;border:1px solid var(--hairs);background:rgba(201,162,74,.12);color:var(--goldlt);
    font-family:inherit;font-weight:700;font-size:13px;padding:9px 14px;border-radius:99px;cursor:pointer;white-space:nowrap;position:relative}
  .chip .dot{position:absolute;top:-5px;right:-5px;min-width:19px;height:19px;padding:0 5px;border-radius:99px;background:linear-gradient(135deg,var(--gold),var(--goldlt));color:#0A2620;font-size:11px;font-weight:800;display:grid;place-items:center}

  /* ---- progress ---- */
  .progress{padding:8px 26px 2px;position:relative;z-index:1}
  .pips{display:flex;gap:7px}
  .pip{flex:1;height:4px;border-radius:99px;background:rgba(201,162,74,.18);overflow:hidden;position:relative}
  .pip .fill{position:absolute;inset:0;border-radius:99px;background:linear-gradient(90deg,var(--gold),var(--goldlt))}
  .pip .sweep{position:absolute;top:0;left:0;width:40%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.65),transparent);animation:kklSweep 1.8s ease-in-out infinite}
  .steptext{font-size:12px;color:var(--creamdim);margin-top:11px;letter-spacing:.4px}
  .steptext b{font-family:'Trirong',serif;font-weight:700;font-size:14px;color:var(--goldlt)}
  .tray{display:flex;gap:8px;margin-top:13px}
  .tray-slot{flex:1;display:flex;align-items:center;gap:7px;padding:6px 7px;border-radius:12px;border:1px dashed var(--hair);background:rgba(255,255,255,.02)}
  .tray-slot.sel{border:1px solid var(--hairs);background:var(--glass)}
  .tray-slot.active{border:1px solid var(--gold);background:rgba(201,162,74,.13)}
  .tray-thumb{width:32px;height:32px;border-radius:9px;overflow:hidden;background:#0A2218;flex:0 0 auto;display:grid;place-items:center}
  .tray-role{font-size:9px;letter-spacing:1.4px;text-transform:uppercase;color:var(--gold);line-height:1.35}
  .tray-name{font-size:11px;color:var(--cream);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.3}

  /* ---- content ---- */
  .content{flex:1;z-index:1}
  .screen{padding:2px 20px 8px}
  .qhead{font-family:'Trirong',serif;font-size:26px;font-weight:600;margin:14px 2px 2px}
  .qsub{font-family:'Trirong',serif;font-style:italic;font-size:13px;color:var(--creamfaint);margin:0 2px 16px}
  .seg-label{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--gold);font-weight:700;margin:4px 2px 10px}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:13px}

  /* ---- product / option card ---- */
  .card{position:relative;background:var(--glass);border:1px solid var(--hair);border-radius:20px;overflow:hidden;cursor:pointer;
    box-shadow:inset 0 1px 0 rgba(255,255,255,.05),0 8px 20px rgba(7,32,25,.4);transition:transform .12s ease}
  .card:active{transform:scale(.985)}
  .card.flat{cursor:default}
  .card.flat:active{transform:none}
  .card .sel-ring{position:absolute;inset:0;border:2px solid var(--gold);border-radius:20px;box-shadow:0 0 0 4px rgba(201,162,74,.16),0 14px 30px rgba(7,32,25,.55);pointer-events:none;z-index:3}
  .card-media{position:relative;aspect-ratio:1/1;background:radial-gradient(circle at 42% 34%,#143A2E,#0A2218);display:grid;place-items:center;overflow:hidden;border-bottom:1px solid var(--hair)}
  .card-media .scrim{position:absolute;inset:0;pointer-events:none;background:linear-gradient(to top,rgba(6,22,17,.86),rgba(6,22,17,.1) 42%,transparent 64%)}
  .illo-img,.illo-svg{width:100%;height:100%;display:block}
  .illo-img{object-fit:cover}
  .price{position:absolute;left:10px;bottom:9px;font-family:'Trirong',serif;font-weight:700;font-size:13px;color:#0A2620;
    background:linear-gradient(100deg,#F2DEA0,#C9A24A);padding:3px 11px;border-radius:99px;
    box-shadow:0 4px 13px rgba(7,32,25,.45),inset 0 1px 0 rgba(255,255,255,.5)}
  .check{position:absolute;top:9px;right:9px;width:27px;height:27px;border-radius:50%;background:linear-gradient(135deg,var(--gold),var(--goldlt));
    display:grid;place-items:center;box-shadow:0 0 14px rgba(201,162,74,.6);animation:kklPop .25s ease;z-index:4}
  .card-body{padding:11px 13px 13px}
  .card-name{font-weight:600;font-size:14px;color:var(--cream);line-height:1.25}
  .card-sub{font-family:'Trirong',serif;font-style:italic;font-size:11px;color:var(--gold);opacity:.82;margin-top:3px}
  .card-desc{font-size:11px;color:var(--creamdim);line-height:1.5;margin-top:6px;min-height:32px}

  /* souvenir add controls */
  .souv-foot{margin-top:11px}
  .souv-add{width:100%;border:1px solid var(--hairs);background:rgba(201,162,74,.1);color:var(--goldlt);font-family:inherit;font-weight:700;font-size:13px;padding:10px;border-radius:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;transition:background .15s}
  .souv-add:hover{background:rgba(201,162,74,.2)}
  .stepper{display:flex;align-items:center;justify-content:space-between;border:1px solid var(--hairs);border-radius:12px;overflow:hidden}
  .stepper button{width:38px;height:38px;border:none;background:rgba(201,162,74,.14);color:var(--goldlt);font-size:19px;font-weight:700;cursor:pointer}
  .stepper button:hover{background:rgba(201,162,74,.24)}
  .stepper .n{flex:1;text-align:center;font-weight:700;font-size:15px;color:var(--cream)}

  /* ---- spice row ---- */
  .spices{display:flex;gap:9px;margin-bottom:22px}
  .spice{position:relative;flex:1;text-align:center;cursor:pointer;border:1px solid var(--hair);background:var(--glass);border-radius:14px;padding:12px 6px}
  .spice .ring{position:absolute;inset:0;border:1.5px solid var(--gold);border-radius:14px;background:rgba(201,162,74,.14)}
  .spice .ic{position:relative;display:flex;justify-content:center;align-items:center;height:20px}
  .spice .nm{position:relative;font-size:12.5px;margin-top:6px;color:var(--creamdim);font-weight:600}

  /* ---- cart ---- */
  .cart-head{text-align:center;padding:8px 8px 2px}
  .cart-head h2{font-family:'Trirong',serif;font-size:27px;font-weight:700;margin:0}
  .backlink{background:none;border:none;color:var(--goldlt);font-family:inherit;font-size:13px;cursor:pointer;padding:6px 2px;margin-top:2px}
  .cart-card{position:relative;margin:14px 2px 0;border-radius:22px;padding:14px 16px;
    background:linear-gradient(170deg,rgba(255,255,255,.07),rgba(255,255,255,.02));border:1px solid var(--hairs);
    box-shadow:inset 0 1px 0 rgba(255,255,255,.08),0 14px 30px rgba(7,32,25,.4);backdrop-filter:blur(10px)}
  .cart-top{display:flex;align-items:flex-start;gap:13px}
  .avatars{display:flex;flex:0 0 auto}
  .avatar{width:48px;height:48px;border-radius:50%;overflow:hidden;background:#0A2218;box-shadow:0 4px 10px rgba(0,0,0,.3);border:2px solid var(--night2)}
  .avatar+.avatar{margin-left:-13px}
  .avatar.single{width:54px;height:54px}
  .cart-label{font-size:10px;letter-spacing:2px;color:var(--gold);text-transform:uppercase}
  .cart-name{font-weight:600;font-size:13.5px;color:var(--cream);line-height:1.35;margin-top:3px}
  .badges{display:flex;align-items:center;gap:6px;margin-top:6px;flex-wrap:wrap}
  .badge{font-size:11px;color:var(--goldlt);border:1px solid var(--hair);border-radius:99px;padding:1px 8px}
  .badge.plain{border:none;padding:0;display:inline-flex;align-items:center;gap:4px}
  .removebtn{flex:0 0 auto;width:28px;height:28px;border-radius:50%;border:1px solid var(--hair);background:transparent;color:var(--creamfaint);font-size:17px;cursor:pointer;line-height:1}
  .cart-foot{display:flex;align-items:center;justify-content:space-between;margin-top:12px;padding-top:12px;border-top:1px dashed var(--hair)}
  .editbtn{background:none;border:none;color:var(--goldlt);font-family:inherit;font-size:12.5px;cursor:pointer;text-decoration:underline;text-underline-offset:2px}
  .qtybox{display:flex;align-items:center;border:1px solid var(--hairs);border-radius:99px;overflow:hidden}
  .qtybox button{width:32px;height:32px;border:none;background:rgba(201,162,74,.14);color:var(--goldlt);font-size:18px;font-weight:700;cursor:pointer}
  .qtybox .n{min-width:30px;text-align:center;font-weight:700;font-size:15px}
  .linetotal{font-family:'Trirong',serif;font-weight:700;color:var(--goldlt);font-size:15px;min-width:52px;text-align:right}
  .secthead{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--gold);font-weight:700;margin:22px 4px 2px;display:flex;align-items:center;gap:8px}
  .secthead .ln{height:1px;flex:1;background:var(--hair)}
  .dashbtn{width:100%;margin-top:14px;border:1px dashed var(--hairs);background:rgba(201,162,74,.06);color:var(--goldlt);font-family:inherit;font-weight:600;font-size:14px;padding:14px;border-radius:16px;cursor:pointer;transition:background .15s}
  .dashbtn:hover{background:rgba(201,162,74,.12)}
  .dashrow{display:flex;gap:11px;margin-top:14px}
  .dashrow .dashbtn{margin-top:0}

  /* ---- form ---- */
  .form{margin-top:18px;display:grid;gap:11px}
  .field{display:grid;gap:5px}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:11px}
  .flabel{font-size:11px;color:var(--gold);font-weight:700;letter-spacing:1px;text-transform:uppercase}
  .finput,.fselect{width:100%;border:1px solid var(--hair);background:rgba(255,255,255,.04);border-radius:12px;padding:11px 13px;font-family:inherit;font-size:15px;color:var(--cream)}
  .finput:focus,.fselect:focus{border-color:var(--gold);outline:none}
  .fselect option{color:#0A2620}

  .totalrow{display:flex;justify-content:space-between;align-items:baseline;margin:18px 2px 4px}
  .totalrow .lbl{font-size:11px;letter-spacing:2px;color:var(--creamdim);text-transform:uppercase}
  .grand{font-family:'Trirong',serif;font-size:32px;font-weight:700}
  .paybox{margin:8px 2px 0;border:1px solid var(--hair);border-radius:18px;padding:16px;text-align:center;background:rgba(255,255,255,.03)}
  .paybox h4{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--gold);margin:0 0 12px}
  .qr{width:150px;height:150px;margin:0 auto;background:#fff;border-radius:12px;padding:8px;display:grid;place-items:center;color:#0A2620;font-size:11px;word-break:break-all}
  .qr img,.qr canvas{display:block}
  .paynote{font-size:12.5px;color:var(--creamdim);margin-top:12px;line-height:1.55}
  .paynote b{color:var(--cream)}

  /* ---- bottom bar ---- */
  .bottombar{position:sticky;bottom:0;z-index:6;padding:16px 20px calc(16px + env(safe-area-inset-bottom));background:linear-gradient(transparent,var(--night) 32%)}
  .barrow{display:flex;gap:11px;align-items:stretch}
  .btn{border:none;font-family:inherit;font-weight:700;font-size:16px;padding:16px;border-radius:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px}
  .btn-ghost{flex:0 0 104px;border:1px solid var(--hairs);background:var(--glass);color:var(--goldlt);backdrop-filter:blur(6px)}
  .btn-primary{flex:1;background:linear-gradient(100deg,#B58B33,#E9D292 50%,#C9A24A);color:#0A2620;box-shadow:0 10px 26px rgba(201,162,74,.32),inset 0 1px 0 rgba(255,255,255,.4)}
  .btn-primary[disabled]{cursor:not-allowed;opacity:.32;box-shadow:none}
  .btn-wa{width:100%;background:#25D366;color:#fff;box-shadow:0 10px 24px rgba(37,211,102,.3)}
  .btn-copy{flex:1;border:1px solid var(--hairs);background:var(--glass);color:var(--goldlt);backdrop-filter:blur(6px);font-size:15px;padding:15px}
  .btn-line{flex:1;background:#06C755;color:#fff;font-size:15px;padding:15px}
  .draftprice{text-align:center;font-size:12px;color:var(--creamdim);margin-top:9px}
  .draftprice b{color:var(--goldlt);font-family:'Trirong',serif}

  /* ---- footer ---- */
  .footer{padding:26px 26px 10px;text-align:center;color:var(--creamfaint);font-size:11.5px;line-height:1.7;z-index:1}
  .footer .fname{font-family:'Trirong',serif;font-style:italic;color:var(--creamdim);font-size:13px}
  .footer a{color:var(--goldlt);text-decoration:none}
  .footer .fdot{opacity:.5;margin:0 5px}

  /* ---- toast ---- */
  .toast{position:fixed;left:50%;bottom:132px;transform:translateX(-50%);background:#0A2620;border:1px solid var(--hairs);color:var(--goldlt);
    padding:11px 18px;border-radius:99px;font-size:13px;font-weight:600;z-index:80;box-shadow:0 10px 30px rgba(0,0,0,.4);animation:kklRise .25s}

  .empty{text-align:center;padding:60px 30px;color:var(--creamdim)}
  .empty .big{font-family:'Trirong',serif;font-size:22px;color:var(--cream);margin-bottom:8px}
</style>
</head>

<script>
"use strict";
(function(){

/* ============================================================
   CONFIG — edit these for the real shop
   ============================================================ */
var CONFIG = {
  promptpayId: '0812345678',     // PromptPay phone / national ID
  whatsappPhone: '66812345678',  // WhatsApp number, country code, no +
  lineId: '@kualuang',           // LINE official id (display only)
  defaultLang: 'th',
  hoursTh: 'เปิดทุกวัน 08:00–20:00',
  hoursEn: 'Open daily 08:00–20:00'
};

/* ============================================================
   SVG DISH ART (ported from original) + souvenir art
   ============================================================ */
var svgOpen='<svg viewBox="0 0 200 200" width="100%" height="100%" preserveAspectRatio="xMidYMid meet" style="display:block" xmlns="http://www.w3.org/2000/svg">';
function _hx(h){h=h.replace('#','');if(h.length===3)h=h.split('').map(function(c){return c+c;}).join('');return [parseInt(h.slice(0,2),16),parseInt(h.slice(2,4),16),parseInt(h.slice(4,6),16)];}
function lighten(h,t){var c=_hx(h);return 'rgb('+c.map(function(v){return Math.round(v+(255-v)*t);}).join(',')+')';}
function darken(h,t){var c=_hx(h);return 'rgb('+c.map(function(v){return Math.round(v*(1-t));}).join(',')+')';}

function ppPayload(id,amount){var f=function(t,v){return t+String(v.length).padStart(2,'0')+v;};var n=id.replace(/[^0-9]/g,''),acc;if(n.length>=13)acc=f('02',n);else{var m='66'+n.replace(/^0/,'');m=('0000000000000'+m).slice(-13);acc=f('01',m);}var merchant=f('29','0016A000000677010111'+acc);var p='000201'+(amount?'010212':'010211')+merchant+'5303764';if(amount)p+=f('54',Number(amount).toFixed(2));p+='5802TH6304';return p+crc16(p);}

function souvStep(id,d){var i=findSouv(id);if(i<0){if(d>0)state.cart.push({kind:'souvenir',id:id,qty:1});}else{state.cart[i].qty+=d;if(state.cart[i].qty<1)state.cart.splice(i,1);}render();}
function setMeta(k,v){state.meta[k]=v;}

function toast(m){state.toast=m;clearTimeout(toastTimer);toastTimer=setTimeout(function(){state.toast='';render();},1800);}

function orderText(){
 var L=state.lang,t=T[L],m=state.meta;
 var out='🍛 '+(L==='th'?'ออเดอร์ — House of Happiness Kitchen':'Order — House of Happiness Kitchen')+'\n';
 if(m.name||m.room||m.time)out+=t.name+': '+(m.name||'-')+' | '+t.room+': '+(m.room||'-')+' | '+t.time+': '+(m.time||t.asap)+'\n';
 var sets=state.cart.filter(function(c){return c.kind!=='souvenir';});
 var souv=state.cart.filter(function(c){return c.kind==='souvenir';});
 sets.forEach(function(set,i){
  out+='— — — — — —\n'+(L==='th'?('เซ็ตที่ '+(i+1)):('Set '+(i+1)))+' ×'+set.qty+'\n';
  out+='• '+nm(set.curry)+' / '+nm(set.veg)+' / '+nm(set.rice)+'\n';
  if(set.spice)out+='  '+t.spice+': '+nm(set.spice)+'\n';
  if(set.extras.length)out+='  '+t.extra+': '+set.extras.map(function(id){return nm(ITEMS[id]);}).join(', ')+'\n';
 });
 if(souv.length){out+='— — — — — —\n'+t.secSouv+'\n';souv.forEach(function(s){var p=ITEMS[s.id];out+='• '+nm(p)+' ×'+s.qty+' (฿'+(p.price*s.qty)+')\n';});}
 if(m.note)out+=t.note+': '+m.note+'\n';
 out+='— — — — — —\n'+t.total+': ฿'+grandTotal();
 return out;
}
function sendWhatsApp(){window.open('https://wa.me/'+CONFIG.whatsappPhone+'?text='+encodeURIComponent(orderText()),'_blank');}
function sendLine(){window.open('https://line.me/R/msg/text/?'+encodeURIComponent(orderText()),'_blank');}
function copyOrder(){var tx=orderText();var done=function(){toast(T[state.lang].copied);};if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(tx).then(done).catch(done);}else done();}

function drawQR(){
 var el=document.getElementById('qr');if(!el)return;
 var amt=grandTotal();el.innerHTML='';qrAmount=amt;
 try{
  if(window.QRCode){new window.QRCode(el,{text:ppPayload(CONFIG.promptpayId,amt),width:150,height:150,correctLevel:window.QRCode.CorrectLevel.M});}
  else{el.textContent='PromptPay '+CONFIG.promptpayId;}
 }catch(e){el.textContent='PromptPay '+CONFIG.promptpayId;}
}

/* ============================================================
   EVENTS (delegated)
   ============================================================ */
root.addEventListener('click',function(e){
 var el=e.target.closest('[data-act]');if(!el)return;
 var act=el.getAttribute('data-act');
 var id=el.getAttribute('data-id'), i=el.getAttribute('data-i'), k=el.getAttribute('data-k');
 switch(act){
  case 'lang': setLang(el.getAttribute('data-l')); break;
  case 'tab': goTab(el.getAttribute('data-tab')); break;
  case 'gocart': goCart(); break;
  case 'continue': backToShop(); break;
  case 'pick': pick(k,id); break;
  case 'spice': pickSpice(id); break;
  case 'extra': toggleExtra(id); break;
  case 'next': (state.step===3)?addToCart():next(); break;
  case 'back': back(); break;
  case 'addanother': startNew(); break;
  case 'shopmore': goTab('shop'); break;
  case 'editset': editSet(+i); break;
  case 'removeset': removeSet(+i); break;
  case 'incset': setQty(+i,1); break;
  case 'decset': setQty(+i,-1); break;
  case 'souvadd': addSouv(id); break;
  case 'souvinc': souvStep(id,1); break;
  case 'souvdec': souvStep(id,-1); break;
  case 'wa': sendWhatsApp(); break;
  case 'line': sendLine(); break;
  case 'copy': copyOrder(); break;
 }
});
/* text/select inputs update state silently (no re-render → keeps focus) */
root.addEventListener('input',function(e){
 var f=e.target.getAttribute&&e.target.getAttribute('data-field');
 if(f)setMeta(f,e.target.value);
});
root.addEventListener('change',function(e){
 var f=e.target.getAttribute&&e.target.getAttribute('data-field');
 if(f==='time')setMeta('time',e.target.value);
});

/* If QR lib loads after first cart render, draw it once ready */
window.addEventListener('load',function(){if(state.view==='cart')drawQR();});

render();
})();
</script>
